<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Destinazione Sbloccata — Corfù</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #020617;
    --ocean-light: #7dd3fc;
    --sand-gold: #fde047;
    --cream: #f8fafc;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); color: var(--cream);
    overflow: hidden; font-family: 'Montserrat', sans-serif;
  }

  #world-container {
    position: fixed; inset: 0; z-index: 1;
    opacity: 0; 
    transition: opacity 4s ease-in;
  }
  
  #stars { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  #globe { position: absolute; inset: 0; z-index: 1; }

  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 100%);
  }

  #intro-curtain {
    position: fixed; inset: 0; z-index: 20;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 2s ease;
  }

  #start-btn {
    appearance: none; background: transparent;
    border: 1px solid rgba(125, 211, 252, 0.4);
    color: var(--ocean-light);
    font-size: 0.85rem; letter-spacing: 0.4em;
    text-transform: uppercase; padding: 18px 36px; border-radius: 50px;
    cursor: pointer; transition: all 0.5s ease;
    backdrop-filter: blur(4px);
  }
  #start-btn:hover {
    border-color: var(--sand-gold); color: var(--sand-gold);
    box-shadow: 0 0 25px rgba(253, 224, 71, 0.3);
    transform: translateY(-2px);
  }

  #cinematic-text {
    position: fixed; inset: 0; z-index: 15; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.5rem, 7vw, 5rem); text-align: center;
    color: var(--cream); 
    text-shadow: 0 4px 20px rgba(14, 165, 233, 0.6);
    opacity: 0; transform: scale(0.95);
    transition: opacity 2s ease, transform 4s ease-out;
    padding: 20px;
  }
  #cinematic-text.visible {
    opacity: 1; transform: scale(1.05); 
  }

  .reveal {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    opacity: 0; transform: translateY(20px);
    transition: opacity 2.5s ease-out, transform 2.5s ease-out;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  
  .reveal .eyebrow { 
    font-size: 0.8rem; letter-spacing: 0.5em; 
    color: var(--ocean-light); margin-bottom: 1.5rem; 
    text-transform: uppercase; font-weight: 300;
  }
  
  .reveal h1 { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(3.5rem, 12vw, 6.5rem); 
    margin: 0; color: var(--cream);
    text-shadow: 0 0 40px rgba(253, 224, 71, 0.4); 
  }
  
  .reveal h2 { 
    font-family: 'Great Vibes', cursive; 
    font-size: clamp(2rem, 5vw, 3.5rem); 
    color: var(--sand-gold);
    margin: 0.5rem 0; 
  }
  
  #confetti-canvas { position: fixed; inset: 0; z-index: 12; pointer-events: none; }

  @keyframes pulse-marker {
    0% { transform: scale(0.8); box-shadow: 0 0 10px 2px rgba(253, 224, 71, 0.5); }
    50% { transform: scale(1.3); box-shadow: 0 0 25px 10px rgba(253, 224, 71, 1); }
    100% { transform: scale(0.8); box-shadow: 0 0 10px 2px rgba(253, 224, 71, 0.5); }
  }
</style>
</head>
<body>

<div id="intro-curtain">
  <button id="start-btn">Inizia il Viaggio</button>
</div>

<div id="cinematic-text"></div>

<div id="world-container">
  <canvas id="stars"></canvas>
  <div id="globe"></div>
  <div class="vignette"></div>
</div>

<div class="reveal" id="reveal">
  <div class="eyebrow">La nostra prossima meta</div>
  <h1>Corfù</h1>
  <h2>Isole Ionie, Grecia</h2>
</div>

<canvas id="confetti-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.34.4/dist/globe.gl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
  // --- 1. STELLE ---
  (function initStars() {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let w, h, stars = [];
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      stars = Array.from({length: 200}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.2 + 0.2, tw: Math.random() * 10
      }));
    }
    function tick() {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#f8fafc';
      stars.forEach(s => {
        s.tw += 0.02;
        ctx.globalAlpha = 0.3 + Math.abs(Math.sin(s.tw)) * 0.7;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      });
      requestAnimationFrame(tick);
    }
    window.addEventListener('resize', resize);
    resize(); tick();
  })();

  // --- 2. GLOBO ---
  const CORFU = { lat: 39.62, lng: 19.92 };
  const world = Globe()(document.getElementById('globe'))
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#3b82f6')
    .atmosphereAltitude(0.15)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .pointOfView({ lat: 10, lng: -40, altitude: 3.5 }, 0);

  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.6;

  world.htmlElementsData([CORFU])
       .htmlElement(() => {
         const el = document.createElement('div');
         el.innerHTML = `<div id="marker" style="opacity:0; transition:2s;"><div style="width:14px; height:14px; background:#fff; border-radius:50%; animation: pulse-marker 2s infinite;"></div></div>`;
         return el;
       });

  // --- 3. SEQUENZA ---
  async function start() {
    document.getElementById('intro-curtain').style.opacity = '0';
    await new Promise(r => setTimeout(r, 2000));
    document.getElementById('intro-curtain').style.display = 'none';

    const phrases = ["Chiudi gli occhi...", "Il mondo è così grande...", "Ma c'è un posto speciale che ci aspetta."];
    const textEl = document.getElementById('cinematic-text');

    for (let p of phrases) {
      textEl.innerText = p;
      textEl.classList.add('visible');
      await new Promise(r => setTimeout(r, 3000));
      textEl.classList.remove('visible');
      await new Promise(r => setTimeout(r, 1500));
    }

    document.getElementById('world-container').style.opacity = '1';
    await new Promise(r => setTimeout(r, 2000));
    
    world.controls().autoRotate = false;
    world.pointOfView({ lat: CORFU.lat, lng: CORFU.lng, altitude: 0.4 }, 5000);
    
    world.ringsData([CORFU]).ringColor(() => '#fde047').ringMaxRadius(2.5);

    await new Promise(r => setTimeout(r, 4500));
    document.getElementById('marker').style.opacity = '1';
    document.getElementById('reveal').classList.add('visible');
    
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#0ea5e9', '#fde047', '#ffffff'] });
  }

  document.getElementById('start-btn').onclick = start;
</script>
</body>
</html>
